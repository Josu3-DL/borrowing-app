{% extends "base.html" %}
{% block title %}Iniciar sesión | Borrowing App{% endblock %}
{% block content %}
<h1>Iniciar sesión</h1>
<form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    <button type="submit">Entrar</button>
</form>
<p>¿Aún no tienes cuenta? <a href="{% url 'users:register' %}">Regístrate</a>.</p>
{% endblock %}
