{% extends 'prestamos/base.html' %}

{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<h2>{{ titulo }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Guardar</button>
    <a href="{% url 'prestamos:lista' %}">Cancelar</a>
</form>
{% endblock %}
