{% extends 'prestamos/base.html' %}

{% block titulo %}Eliminar préstamo{% endblock %}

{% block contenido %}
<h2>Eliminar préstamo</h2>
<p>¿Seguro que deseas eliminar el préstamo de <strong>{{ prestamo.cliente }}</strong> por
   <strong>{{ prestamo.monto }}</strong>? Esta acción no se puede deshacer.</p>
<form method="post">
    {% csrf_token %}
    <button class="btn" type="submit">Sí, eliminar</button>
    <a href="{% url 'prestamos:lista' %}">Cancelar</a>
</form>
{% endblock %}
