<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Gestión de préstamos{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; color: #222; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
        th { background: #f0f0f0; }
        .pendiente { color: #b8860b; font-weight: bold; }
        .pagado { color: #2e7d32; font-weight: bold; }
        .acciones a { margin-right: 0.5rem; }
        .mensajes { list-style: none; padding: 0; }
        .mensajes li { padding: 0.5rem; margin-bottom: 0.5rem; background: #e8f5e9; border: 1px solid #a5d6a7; }
        form p { margin: 0.75rem 0; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #1565c0; color: #fff; text-decoration: none; border: none; cursor: pointer; }
        .filtros { margin: 1rem 0; }
        .filtros a { margin-right: 1rem; }
    </style>
</head>
<body>
    <h1><a href="{% url 'prestamos:lista' %}" style="text-decoration:none; color:inherit;">Gestión de préstamos</a></h1>

    {% if messages %}
    <ul class="mensajes">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% block contenido %}{% endblock %}
</body>
</html>
